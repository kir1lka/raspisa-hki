# Продакшен-конфиг: приложение + PostgreSQL + Caddy (HTTPS).
# Запуск на сервере:  docker compose -f docker-compose.prod.yml up --build -d
# Перед запуском создай рядом файл .env с DOMAIN и DB_PASSWORD (см. .env.prod.example).
services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: raspisa
      POSTGRES_USER: raspisa
      POSTGRES_PASSWORD: ${DB_PASSWORD:-raspisa}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U raspisa"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  app:
    build: .
    depends_on:
      db:
        condition: service_healthy
    environment:
      DB_URL: jdbc:postgresql://db:5432/raspisa
      DB_USERNAME: raspisa
      DB_PASSWORD: ${DB_PASSWORD:-raspisa}
      SERVER_PORT: 8080
      # Web Push (VAPID) — значения берутся из .env рядом с этим файлом.
      # Если не заданы — push просто отключён, остальное работает как обычно.
      VAPID_PUBLIC_KEY: ${VAPID_PUBLIC_KEY:-}
      VAPID_PRIVATE_KEY: ${VAPID_PRIVATE_KEY:-}
      VAPID_SUBJECT: ${VAPID_SUBJECT:-mailto:admin@example.com}
    expose:
      - "8080"          # внутренний порт — наружу НЕ публикуем (доступ только через Caddy)
    restart: unless-stopped

  caddy:
    image: caddy:2
    depends_on:
      - app
    ports:
      - "80:80"
      - "443:443"       # HTTPS
    environment:
      DOMAIN: ${DOMAIN:-localhost}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data      # тут хранятся сертификаты (переживают перезапуск)
      - caddy_config:/config
    restart: unless-stopped

volumes:
  pgdata:
  caddy_data:
  caddy_config:
